# ── CrewCmd Docker Compose ────────────────────────────────────────
#
# Quick start:
#   cp .env.example .env.local
#   docker compose up
#
# This runs CrewCmd with a local Postgres database.
# For PGlite mode (no database), use: docker compose up app
# ──────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crewcmd
      POSTGRES_USER: crewcmd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crewcmd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewcmd -d crewcmd"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://crewcmd:${POSTGRES_PASSWORD:-crewcmd}@db:5432/crewcmd
      AUTH_SECRET: ${AUTH_SECRET:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      HEARTBEAT_SECRET: ${HEARTBEAT_SECRET:-}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
